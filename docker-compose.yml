services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: noxwatch
      POSTGRES_PASSWORD: noxwatch_dev_password
      POSTGRES_DB: noxwatch
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data_v18:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U noxwatch -d noxwatch"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:8-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: deployments/docker/api.Dockerfile
    env_file: .env
    environment:
      HTTP_ADDR: :8080
      DATABASE_URL: postgres://noxwatch:noxwatch_dev_password@postgres:5432/noxwatch?sslmode=disable
      REDIS_ADDR: redis:6379
      MIGRATIONS_DIR: /app/migrations
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/api", "-healthcheck"]
      interval: 10s
      timeout: 3s
      retries: 10

  web:
    build:
      context: .
      dockerfile: deployments/docker/web.Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data_v18:
