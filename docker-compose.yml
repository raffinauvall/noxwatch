services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: noxwatch
      POSTGRES_PASSWORD: noxwatch_dev_password
      POSTGRES_DB: noxwatch
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data_v18:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U noxwatch -d noxwatch"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:8-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: deployments/docker/api.Dockerfile
    env_file: .env
    environment:
      HTTP_ADDR: :8080
      DATABASE_URL: postgres://noxwatch:noxwatch_dev_password@postgres:5432/noxwatch?sslmode=disable
      REDIS_ADDR: redis:6379
      MIGRATIONS_DIR: /app/migrations
      PUBLIC_WEB_URL: ${PUBLIC_WEB_URL:-http://localhost:3000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      METRIC_RETENTION_DAYS: ${METRIC_RETENTION_DAYS:-30}
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/api", "-healthcheck"]
      interval: 10s
      timeout: 3s
      retries: 10

  web:
    build:
      context: .
      dockerfile: deployments/docker/web.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/login >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 10

volumes:
  postgres_data_v18:
